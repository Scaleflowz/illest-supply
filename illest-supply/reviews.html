<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reviews | The Illest Supply</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style id="globalStyles"></style>
<style>
.reviews-hero{text-align:center;padding:60px 20px 40px;}
.reviews-hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,7vw,88px);margin-bottom:10px;}
.rating-summary{display:flex;align-items:center;justify-content:center;gap:32px;margin:24px 0 40px;flex-wrap:wrap;}
.rating-big{font-family:'Bebas Neue',sans-serif;font-size:80px;line-height:1;}
.rating-stars{font-size:22px;color:#f59e0b;letter-spacing:3px;margin-bottom:4px;}
.rating-count{font-size:13px;color:#333;}
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.review-card{background:#0d0d0d;border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:24px;}
.review-stars{font-size:13px;color:#f59e0b;margin-bottom:10px;}
.review-text{font-size:13px;color:#666;line-height:1.7;margin-bottom:16px;}
.review-meta{display:flex;justify-content:space-between;align-items:flex-end;}
.review-name{font-size:13px;font-weight:700;}
.review-product{font-size:11px;color:#333;margin-top:2px;}
.verified-badge{font-size:10px;font-weight:700;letter-spacing:.1em;color:#22c55e;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.15);padding:4px 10px;border-radius:50px;}
@media(max-width:768px){.reviews-grid{grid-template-columns:1fr;}}
</style></head><body>
<div id="navContainer"></div>
<main>
<div class="reviews-hero"><div class="container">
  <div class="section-title">Real Talk</div>
  <h1>Customer Reviews</h1>
  <div class="rating-summary">
    <div><div class="rating-big">4.9</div></div>
    <div><div class="rating-stars">★★★★★</div><div class="rating-count">Based on 2,000+ verified sales</div></div>
  </div>
</div></div>
<section><div class="container">
  <div class="reviews-grid" id="reviewsGrid"></div>
  <div style="text-align:center;margin-top:40px;padding:32px;background:#0a0a0a;border:1px solid rgba(255,255,255,.05);border-radius:20px;">
    <div style="font-size:15px;font-weight:700;margin-bottom:6px;">Shop the pieces people are talking about</div>
    <p style="font-size:13px;color:#333;margin-bottom:20px;">Every review is from a real customer. Every piece is verified before it ships.</p>
    <a href="shop.html" class="btn-primary">Shop Now</a>
  </div>
</div></section>
</main>
<div id="footerContainer"></div>
<script src="cart.js?v=2"></script><script src="products.js?v=2"></script>
<script>
document.getElementById('globalStyles').textContent=getGlobalCSS();
document.getElementById('navContainer').innerHTML=getNavHTML('reviews');
document.getElementById('footerContainer').innerHTML=getFooterHTML();
const REVIEWS=[
  {name:"Jordan M.",user:"@jordan.fits",stars:5,text:"Bottegas came through immaculate. Exactly as described, packed perfectly, and shipped fast. These are my most complimented pair right now.",product:"Bottega Veneta (Green)",verified:true},
  {name:"Maya R.",user:"@maya.style",stars:5,text:"Asics Gel Kayano 14 in the pink glow — deadstock, packed properly, size was perfect. Will be back for the next drop for sure.",product:"Asics Gel Kayano 14 Pink Glow",verified:true},
  {name:"Tyler J.",user:"@tylrjay",stars:5,text:"Rick Owens for $150? These go crazy. Legit, fast shipping, no cap. The Illest Supply is real.",product:"Rick Owens Ramones",verified:true},
  {name:"Aaliyah K.",user:"@aaliyah.k",stars:5,text:"Dior slides are perfect. Came in a week, exactly what was shown. Super clean. Already showed them off.",product:"Dior Slides",verified:true},
  {name:"Marcus T.",user:"@marcustfit",stars:5,text:"Prada Cups are hard. Got the black pair, they're exactly as described. Clean packaging too.",product:"Prada Cup (Black)",verified:true},
  {name:"Simone W.",user:"@simone_w",stars:5,text:"Balenciaga slides were clean and arrived super fast. Will definitely order again.",product:"Balenciaga Slides",verified:true},
  {name:"Devon H.",user:"@devonhaze",stars:5,text:"Bottegas in blue are actually crazy. Got compliments the first day. Highly recommend The Illest Supply.",product:"Bottega Veneta (Blue)",verified:true},
  {name:"Jasmine P.",user:"@jasminewears",stars:5,text:"The packaging is premium, the product is premium. You can tell they actually care about what they're selling.",product:"Dior Slides",verified:true},
  {name:"Noah C.",user:"@noahcold",stars:5,text:"Ordered the Asics and they came exactly as shown. Deadstock, correct size, fast. No drama, just clean.",product:"Asics Gel Kayano 14 Pink Glow",verified:true},
];
document.getElementById('reviewsGrid').innerHTML=REVIEWS.map(r=>`
  <div class="review-card">
    <div class="review-stars">${'★'.repeat(r.stars)}</div>
    <div class="review-text">"${r.text}"</div>
    <div class="review-meta">
      <div><div class="review-name">${r.name} <span style="color:#333;font-weight:400;font-size:11px;">${r.user}</span></div><div class="review-product">${r.product}</div></div>
      ${r.verified?'<div class="verified-badge">VERIFIED</div>':''}
    </div>
  </div>`).join('');
</script>
</body></html>

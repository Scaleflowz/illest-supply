<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; align-items: center; min-height: 100vh; padding: 40px; }
    .card { background: transparent; text-align: center; }
    img { height: 400px; object-fit: contain; display: block; margin: 0 auto 16px; }
    p { color: #fff; font-family: 'Inter', sans-serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://media.base44.com/images/public/6a21ea02495f72afbc2ec54c/35ae1e2e5_AdobeExpress-file.png" alt="Bad Dreams Shorts" />
    <p>Bad Dreams Rhinestone Shorts</p>
  </div>
  <div class="card">
    <img src="https://media.base44.com/images/public/6a21ea02495f72afbc2ec54c/040af7300_AdobeExpress-file3.png" alt="Valley Denim Shorts" />
    <p>Valley Denim Shorts</p>
  </div>
</body>
</html>
